; PlatformIO Project Configuration File for CDJ-100S Display
; STM32F746NGH6 

[platformio]
src_dir = .
include_dir = Inc

[env:disco_f746ng]
platform = ststm32
board = disco_f746ng

; Build flags
build_flags = 
    -DUSE_HAL_DRIVER
    -DSTM32F746xx
    -DARM_MATH_CM7
    -D__weak=__attribute__((weak))
    -D__packed=__attribute__((__packed__))
    -IInc
    -IDrivers/STM32F7xx_HAL_Driver/Inc
    -IDrivers/STM32F7xx_HAL_Driver/Inc/Legacy
    -IDrivers/CMSIS/Device/ST/STM32F7xx/Include
    -IDrivers/CMSIS/Include
    -IMiddlewares/Third_Party/FatFs/src
    -IMiddlewares/Third_Party/Helix
    -IMiddlewares/Third_Party/Helix/pub
    -IMiddlewares/Third_Party/Helix/real
    -IMiddlewares/ST/STM32_USB_Host_Library/Core/Inc
    -IMiddlewares/ST/STM32_USB_Host_Library/Class/MSC/Inc
    -IFFT

; Source filter - specify all source directories  
build_src_filter =
    +<Src/*.c>
    +<Drivers/STM32F7xx_HAL_Driver/Src/*.c>
    -<Drivers/STM32F7xx_HAL_Driver/Src/*template*.c>
    +<Middlewares/Third_Party/**/*.c>
    +<Middlewares/ST/STM32_USB_Host_Library/Core/Src/*.c>
    +<Middlewares/ST/STM32_USB_Host_Library/Class/MSC/Src/*.c>
    -<Middlewares/ST/STM32_USB_Host_Library/Class/AUDIO/*>
    -<Middlewares/ST/STM32_USB_Host_Library/Class/HID/*>
    -<Middlewares/ST/STM32_USB_Host_Library/Class/CDC/*>
    -<Middlewares/ST/STM32_USB_Host_Library/Class/MTP/*>
    -<Middlewares/ST/STM32_USB_Host_Library/Core/Src/usbh_conf_template.c>
    +<FFT/*.c>
    +<startup/*.s>
    -<syscalls.c>

; Linker settings
board_build.ldscript = STM32F746NGHx_FLASH.ld

; Upload and debug
upload_protocol = stlink
debug_tool = stlink
